services:
  artemis:
    image: apache/activemq-artemis:2.44.0-alpine
    container_name: artemis
    ports:
    - "8161:8161"
    - "61616:61616"
    - "5672:5672"
    environment:
    - "ANONYMOUS_LOGIN=true"
    networks:
    - artemis

networks:
  artemis:
    name: artemis
    driver: bridge
  
